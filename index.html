<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赤壁之戰 - 三國鼎立</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#000;font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif;color:#e8dcc8;user-select:none;}
canvas{display:block;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}

#intro{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 50% 60%,#1a0a00 0%,#000 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;cursor:pointer;transition:opacity 2s;}
#intro .dynasty{font-size:16px;color:#8b7355;letter-spacing:12px;margin-bottom:20px;}
#intro h1{font-size:clamp(48px,10vw,96px);color:#ffd700;text-shadow:0 0 60px rgba(255,100,0,0.5),0 0 120px rgba(255,50,0,0.2);letter-spacing:20px;margin-bottom:10px;}
#intro .year{font-size:clamp(16px,3vw,24px);color:#b89060;letter-spacing:6px;margin-bottom:30px;}
#intro .desc{color:#8b7355;font-size:14px;max-width:500px;text-align:center;line-height:1.8;margin-top:10px;}
#intro .prompt{font-size:14px;color:#665540;animation:pulse 2s infinite;margin-top:20px;}
@keyframes pulse{0%,100%{opacity:0.4;}50%{opacity:1;}}

#header{position:absolute;top:0;left:0;width:100%;padding:10px 20px;background:linear-gradient(180deg,rgba(0,0,0,0.7) 0%,transparent 100%);display:flex;justify-content:space-between;align-items:center;z-index:10;}
#header h1{font-size:18px;color:#c8a060;letter-spacing:6px;text-shadow:0 2px 8px #000;}
#header .phase{font-size:14px;color:#ffd700;text-shadow:0 0 10px rgba(255,180,0,0.5);}

#weather{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);padding:4px 16px;border-radius:16px;font-size:13px;z-index:10;white-space:nowrap;}

#armies{position:absolute;top:80px;left:12px;z-index:10;pointer-events:auto;}
.army-row{display:flex;align-items:center;gap:8px;margin:6px 0;padding:8px 12px;background:rgba(0,0,0,0.6);border-radius:8px;border-left:3px solid;font-size:12px;min-width:200px;}
.army-row.cao{border-color:#4488ff;}
.army-row.sun{border-color:#ff4444;}
.army-row.liu{border-color:#44cc44;}
.army-row .name{font-weight:bold;min-width:50px;}
.army-row.cao .name{color:#6699ff;}
.army-row.sun .name{color:#ff6666;}
.army-row.liu .name{color:#66dd66;}
.army-row .bar{width:80px;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
.army-row .bar-f{height:100%;border-radius:3px;transition:width 0.8s;}
.army-row.cao .bar-f{background:#4488ff;}
.army-row.sun .bar-f{background:#ff4444;}
.army-row.liu .bar-f{background:#44cc44;}
.army-row .count{color:#999;font-size:11px;min-width:60px;text-align:right;}

#events{position:absolute;top:80px;right:12px;width:260px;max-height:calc(100vh - 200px);overflow-y:auto;background:rgba(0,0,0,0.6);border-radius:10px;padding:12px;z-index:10;}
#events h3{font-size:13px;color:#c8a060;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.1);}
.ev{padding:5px 0;font-size:11px;line-height:1.5;color:#665;border-bottom:1px solid rgba(255,255,255,0.04);}
.ev.on{color:#ffd700;font-weight:bold;font-size:12px;}
.ev .et{color:#555;font-size:10px;margin-right:6px;}

#legend{position:absolute;bottom:90px;right:12px;background:rgba(0,0,0,0.7);border-radius:8px;padding:8px 12px;font-size:11px;z-index:10;}
#legend div{margin:2px 0;display:flex;align-items:center;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;}

#minimap{position:absolute;bottom:90px;left:12px;width:140px;height:80px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.1);border-radius:6px;z-index:10;overflow:hidden;}
#minimap canvas{width:100%;height:100%;}

#cam-hint{position:absolute;bottom:74px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,0.3);z-index:10;white-space:nowrap;}

#strategy-popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(24px,5vw,48px);color:#ffd700;text-shadow:0 0 40px rgba(255,100,0,0.8),0 0 80px rgba(255,50,0,0.4);pointer-events:none;z-index:50;opacity:0;transition:opacity 0.5s;letter-spacing:8px;white-space:nowrap;}

#audio-btn{position:absolute;top:12px;right:12px;z-index:100;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;pointer-events:auto;}

#timeline{position:absolute;bottom:0;left:0;width:100%;height:64px;background:linear-gradient(0deg,rgba(0,0,0,0.8) 0%,rgba(0,0,0,0.3) 80%,transparent 100%);display:flex;align-items:center;padding:0 16px;z-index:10;gap:12px;}
#timeline button{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:5px 12px;border-radius:5px;cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap;pointer-events:auto;}
#timeline button:hover{background:rgba(255,255,255,0.2);}
#timeline button.on{background:rgba(255,150,0,0.3);border-color:#c89030;}
#t-track{flex:1;height:5px;background:rgba(255,255,255,0.12);border-radius:3px;position:relative;cursor:pointer;}
#t-fill{height:100%;background:linear-gradient(90deg,#4488ff,#ffa500,#ff4400);border-radius:3px;width:0%;}
#t-thumb{position:absolute;top:-6px;width:16px;height:17px;background:#ffd700;border-radius:8px;border:2px solid #8b6914;left:0%;transform:translateX(-50%);cursor:grab;}
#t-label{position:absolute;top:14px;left:0;width:100%;display:flex;justify-content:space-between;font-size:9px;color:rgba(255,255,255,0.3);pointer-events:none;}
#t-time{font-size:12px;color:#c8a060;min-width:80px;text-align:center;white-space:nowrap;}
</style>
</head>
<body>

<div id="intro">
  <div class="dynasty">三 國 時 代</div>
  <h1>赤壁之戰</h1>
  <div class="year">建安十三年 公元 208 年</div>
  <div class="desc">
    曹操率八十萬大軍順江而下<br>
    孫權劉備聯軍五萬抵禦<br>
    周瑜黃蓋火攻定三分天下
  </div>
  <div class="prompt">- 點擊任意處開始 -</div>
</div>

<div id="ui">
  <div id="header">
    <h1>赤壁之戰</h1>
    <div class="phase" id="phase-label">曹操南下</div>
  </div>
  <div id="weather">☀ 東南風微弱</div>
  <button id="audio-btn">🔇 音效</button>

  <div id="armies">
    <div class="army-row cao"><span class="name">曹操</span><div class="bar"><div class="bar-f" id="cao-bar" style="width:100%"></div></div><span class="count" id="cao-num">830,000</span></div>
    <div class="army-row sun"><span class="name">孫權</span><div class="bar"><div class="bar-f" id="sun-bar" style="width:60%"></div></div><span class="count" id="sun-num">50,000</span></div>
    <div class="army-row liu"><span class="name">劉備</span><div class="bar"><div class="bar-f" id="liu-bar" style="width:24%"></div></div><span class="count" id="liu-num">20,000</span></div>
  </div>

  <div id="events"><h3>戰事記錄</h3><div id="ev-list"></div></div>
  <div id="legend">
    <div><span class="dot" style="background:#4488ff"></span>曹操軍</div>
    <div><span class="dot" style="background:#ff4444"></span>孫權軍</div>
    <div><span class="dot" style="background:#44cc44"></span>劉備軍</div>
    <div><span class="dot" style="background:#ffa500"></span>計策</div>
  </div>
  <div id="minimap"><canvas id="mm-cv"></canvas></div>
  <div id="strategy-popup"></div>
  <div id="cam-hint">滑鼠左鍵旋轉 · 右鍵平移 · 滾輪縮放</div>

  <div id="timeline">
    <button id="btn-play">▶ 播放</button>
    <button id="btn-sl">◀◀</button>
    <button id="btn-sf">▶▶</button>
    <div id="t-track">
      <div id="t-fill"></div>
      <div id="t-thumb"></div>
      <div id="t-label"><span>曹操南下</span><span>周瑜決戰</span><span>火攻赤壁</span><span>天下三分</span></div>
    </div>
    <div id="t-time">建安十三年冬</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function(){
"use strict";

/* ====== 場景 ====== */
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.0006);

var camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 1, 3000);
var renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'low-power'});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.7;
document.body.appendChild(renderer.domElement);

var controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.04;
controls.maxPolarAngle = Math.PI*0.46;
controls.minDistance = 80;
controls.maxDistance = 800;
controls.target.set(0,0,-50);
camera.position.set(0, 250, 400);

/* ====== 光照 ====== */
var ambLight = new THREE.AmbientLight(0x334455, 0.5);
scene.add(ambLight);
var sunLight = new THREE.DirectionalLight(0xffeedd, 1);
sunLight.position.set(200,300,100);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(1024,1024);
sunLight.shadow.camera.left=-400; sunLight.shadow.camera.right=400;
sunLight.shadow.camera.top=400; sunLight.shadow.camera.bottom=-400;
scene.add(sunLight);
scene.add(new THREE.HemisphereLight(0x6688aa, 0x443322, 0.3));

/* ====== 地形 ====== */
var waterGeo = new THREE.PlaneGeometry(2000, 900, 50, 25);
var waterMat = new THREE.MeshPhongMaterial({color:0x0a2a4a, shininess:100, specular:0x3355aa, transparent:true, opacity:0.85});
var water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
water.receiveShadow = true;
scene.add(water);

function makeBank(w, d, z) {
  var g = new THREE.PlaneGeometry(w, d, 25, 6);
  var p = g.attributes.position;
  for(var i=0;i<p.count;i++) p.setZ(i, 4+Math.random()*3);
  g.computeVertexNormals();
  var m = new THREE.MeshPhongMaterial({color:0x2a4a1a, flatShading:true});
  var mesh = new THREE.Mesh(g, m);
  mesh.rotation.x = -Math.PI/2;
  mesh.position.set(0, 0.5, z);
  mesh.receiveShadow = true;
  scene.add(mesh);
}
makeBank(2000, 180, -400);
makeBank(2000, 200, 380);

var hill = new THREE.Mesh(new THREE.ConeGeometry(35, 45, 6, 3), new THREE.MeshPhongMaterial({color:0x8b4513, flatShading:true}));
hill.position.set(80, 12, 340);
hill.castShadow = true;
scene.add(hill);

function addLabel(text, x, y, z, color, sz) {
  sz = sz || 1;
  var c = document.createElement('canvas');
  var ctx = c.getContext('2d');
  c.width = 512; c.height = 128;
  ctx.font = 'bold 34px "Microsoft JhengHei","Noto Sans TC",sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillText(text,257,65);
  ctx.fillStyle='#'+color.toString(16).padStart(6,'0'); ctx.fillText(text,256,64);
  var tex = new THREE.CanvasTexture(c);
  var sp = new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false}));
  sp.position.set(x,y,z); sp.scale.set(70*sz,17.5*sz,1);
  scene.add(sp);
}
addLabel('赤壁', 80, 55, 340, 0xff6644, 1.2);
addLabel('長江', -180, 6, 0, 0x6699cc);
addLabel('烏林', -180, 6, -380, 0x889999);
addLabel('夏口', -450, 6, -180, 0x889999);
addLabel('荊州', -650, 6, -300, 0x889999);
addLabel('華容道', -380, 6, 180, 0x889999);

/* ====== 船艦 ====== */
function makeShip(color) {
  var g = new THREE.Group();
  var hull = new THREE.Mesh(new THREE.BoxGeometry(6, 2.5, 16), new THREE.MeshPhongMaterial({color:0x7a6040}));
  hull.castShadow = true;
  g.add(hull);
  var deck = new THREE.Mesh(new THREE.BoxGeometry(5.5,0.4,15), new THREE.MeshPhongMaterial({color:0x9a8060}));
  deck.position.y = 1.45;
  g.add(deck);
  var mast = new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,12,4), new THREE.MeshPhongMaterial({color:0x5a4230}));
  mast.position.y = 7.5;
  g.add(mast);
  var sail = new THREE.Mesh(new THREE.PlaneGeometry(5,8), new THREE.MeshPhongMaterial({color:color,side:THREE.DoubleSide,transparent:true,opacity:0.8}));
  sail.position.y = 7.5;
  g.add(sail);
  var fc = document.createElement('canvas');
  fc.width=128; fc.height=96;
  var f=fc.getContext('2d');
  f.fillStyle='#'+color.toString(16).padStart(6,'0');
  f.fillRect(0,0,128,96);
  f.fillStyle='#fff'; f.font='bold 50px sans-serif'; f.textAlign='center'; f.textBaseline='middle';
  f.fillText(color===0x4488ff?'曹':color===0xff4444?'孫':'劉', 64, 48);
  var flag = new THREE.Mesh(new THREE.PlaneGeometry(3.5,2.5), new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(fc),side:THREE.DoubleSide}));
  flag.position.y = 13.5;
  g.add(flag);
  return g;
}

var cao=[], sun=[], liu=[];

function deployArmy(arr, army, color, cx, cz, cols, rows, spread) {
  for(var i=0;i<cols*rows;i++){
    var col=i%cols, row=Math.floor(i/cols);
    var ox = cx + (col-cols/2)*spread + (Math.random()-0.5)*10;
    var oz = cz + (row-rows/2)*spread*0.8 + (Math.random()-0.5)*8;
    var ship = makeShip(color);
    ship.position.set(ox,0,oz);
    scene.add(ship);
    var u = {mesh:ship, army:army, ox:ox, oz:oz, x:ox, z:oz, tx:ox, tz:oz, idx:i};
    arr.push(u);
  }
}
deployArmy(cao, 'cao', 0x4488ff, -100, -280, 8, 6, 30);
deployArmy(sun, 'sun', 0xff4444, 0, 300, 5, 5, 30);
deployArmy(liu, 'liu', 0x44cc44, -50, 370, 4, 3, 30);

/* ====== 將領 ====== */
var generals = [];
function addGeneral(name, title, color, x, y, z) {
  var g = new THREE.Group();
  var glow = new THREE.Mesh(new THREE.SphereGeometry(1.8,8,8), new THREE.MeshBasicMaterial({color:color,transparent:true,opacity:0.35}));
  g.add(glow);
  g.add(new THREE.Mesh(new THREE.SphereGeometry(0.8,6,6), new THREE.MeshBasicMaterial({color:0xffffff})));
  g.add(new THREE.PointLight(color, 1.5, 25));
  addLabel(name, x, y+12, z, color, 0.8);
  g.position.set(x,y,z);
  scene.add(g);
  generals.push({g:g, name:name, title:title, color:color, ox:x, oz:z});
}
addGeneral('曹操','魏王·83萬大軍', 0x4488ff, -100, 4, -260);
addGeneral('周瑜','大都督·吳軍', 0xff4444, 10, 4, 290);
addGeneral('劉備','皇叔·2萬精兵', 0x44cc44, -50, 4, 365);
addGeneral('諸葛亮','軍師·借東風', 0x44cc44, -25, 4, 355);
addGeneral('黃蓋','老將·火攻計', 0xff4444, 30, 4, 305);
addGeneral('龐統','鳳雛·連環計', 0x44cc44, -120, 4, -265);
addGeneral('關羽','萬軍取上将', 0x44cc44, -90, 4, 380);
addGeneral('趙雲','長坂英雄', 0x44cc44, -70, 4, 385);
addGeneral('魯肅','盟約推手', 0xff4444, 25, 4, 345);
addGeneral('許褚','虎賁將軍', 0x4488ff, -130, 4, -270);

/* ====== 粒子 ====== */
var firePool = [];
var smokePool = [];

function spawnFire(x, y, z) {
  for(var i=0;i<10;i++){
    var s = 0.4+Math.random()*1.2;
    var m = new THREE.Mesh(
      new THREE.SphereGeometry(s,5,5),
      new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(0.06+Math.random()*0.06,1,0.45+Math.random()*0.25),transparent:true,opacity:0.85})
    );
    m.position.set(x+(Math.random()-0.5)*12, y+Math.random()*3, z+(Math.random()-0.5)*12);
    scene.add(m);
    firePool.push({m:m, vx:(Math.random()-0.5)*0.3, vy:0.4+Math.random()*0.8, vz:(Math.random()-0.5)*0.3, life:1, decay:0.004+Math.random()*0.006});
  }
  for(var i=0;i<5;i++){
    var s = 1.5+Math.random()*3;
    var m = new THREE.Mesh(
      new THREE.SphereGeometry(s,5,5),
      new THREE.MeshBasicMaterial({color:0x333333,transparent:true,opacity:0.4})
    );
    m.position.set(x+(Math.random()-0.5)*16, y+4+Math.random()*8, z+(Math.random()-0.5)*16);
    scene.add(m);
    smokePool.push({m:m, vy:0.2+Math.random()*0.2, life:1, decay:0.002+Math.random()*0.003});
  }
}

function flashLightning() {
  var pts = [];
  var cx=(Math.random()-0.5)*500, cy=80, cz=(Math.random()-0.5)*500;
  for(var i=0;i<6;i++){cx+=(Math.random()-0.5)*8;cy-=12+Math.random()*5;cz+=(Math.random()-0.5)*8;pts.push(new THREE.Vector3(cx,cy,cz));}
  var ln = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({color:0xaaccff}));
  scene.add(ln);
  var fl = new THREE.PointLight(0xaaccff, 15, 600);
  fl.position.set(cx,60,cz);
  scene.add(fl);
  setTimeout(function(){scene.remove(ln);scene.remove(fl);},400);
}

/* ====== 事件 ====== */
var events = [
  {t:0.00, lb:'曹操南下', ph:'曹操率八十萬大軍南下'},
  {t:0.06, lb:'劉備敗退', ph:'當陽長坂坡敗退，撤往夏口'},
  {t:0.12, lb:'孫劉聯盟', ph:'諸葛亮赴柴桑勸孫權聯合抗曹'},
  {t:0.18, lb:'周瑜率軍', ph:'周瑜率吳軍五萬出江陵'},
  {t:0.24, lb:'曹軍駐烏林', ph:'曹操大軍駐紮江北烏林'},
  {t:0.30, lb:'連環計', ph:'龐統獻計，曹軍船艦鐵鏈相連', strat:'鏈 連環計發動！'},
  {t:0.36, lb:'周瑜探軍', ph:'周瑜親率輕舟觀察曹軍'},
  {t:0.42, lb:'苦肉計', ph:'黃蓋詐降曹操', strat:'劍 苦肉計發動！'},
  {t:0.48, lb:'草船借箭', ph:'諸葛亮草船借箭'},
  {t:0.54, lb:'借東風', ph:'諸葛亮祭壇借得東南大風！', strat:'風 東南風起！'},
  {t:0.60, lb:'火船出發', ph:'黃蓋率火船衝向曹軍'},
  {t:0.66, lb:'赤壁火攻！', ph:'火船衝入曹營！大火吞噬連環艦！', strat:'火 火攻發動！赤壁燒燬！'},
  {t:0.72, lb:'曹軍崩潰', ph:'曹軍艦隊全線燃燒'},
  {t:0.78, lb:'孫劉夾擊', ph:'聯軍南北夾擊大破曹軍'},
  {t:0.82, lb:'曹操敗走', ph:'曹操率殘兵由華容道撤退'},
  {t:0.88, lb:'華容道義釋', ph:'關羽念舊情放曹操過華容道'},
  {t:0.92, lb:'周瑜追擊', ph:'周瑜率軍追擊至南郡'},
  {t:0.96, lb:'三足鼎立', ph:'赤壁之戰奠定三國鼎立之局', strat:'冠 三足鼎立 天下三分'},
  {t:1.0, lb:'天下三分', ph:'魏蜀吳三分天下，時代開啟'},
];

/* ====== 狀態 ====== */
var progress = 0;
var playing = false;
var speed = 1;
var fireDone = false;
var windDone = false;
var started = false;
var audioOn = false;
var userCam = false;
var strategyTimer = 0;

/* ====== 電影運鏡 ====== */
var camViews = [
  {name:'全景俯瞰', pos:[0,350,350], tar:[0,0,-50]},
  {name:'曹軍大營', pos:[-80,100,-200], tar:[-100,0,-280]},
  {name:'周瑜中軍', pos:[20,80,380], tar:[10,0,300]},
  {name:'長江對望', pos:[0,150,50], tar:[0,0,-100]},
  {name:'側翼觀戰', pos:[150,120,100], tar:[-50,0,-100]},
  {name:'赤壁近景', pos:[60,50,320], tar:[80,20,340]},
  {name:'鳥瞰戰場', pos:[0,500,0], tar:[0,0,0]},
  {name:'曹軍崩潰', pos:[-100,80,-200], tar:[-100,0,-350]},
  {name:'敗走華容', pos:[-250,120,-50], tar:[-380,0,180]},
  {name:'天下三分', pos:[0,400,200], tar:[0,0,0]},
];
var camIdx = 0;
var camT = 0;
var camFrom = {x:0,y:250,z:400};
var camTo = {x:0,y:350,z:350};
var camTarFrom = new THREE.Vector3(0,0,-50);
var camTarTo = new THREE.Vector3(0,0,-50);
var camTransitioning = false;
var camHoldTimer = 0;

function selectCamera(p) {
  var idx;
  if(p<0.08) idx=0; else if(p<0.15) idx=1; else if(p<0.25) idx=2;
  else if(p<0.35) idx=3; else if(p<0.45) idx=4; else if(p<0.55) idx=5;
  else if(p<0.66) idx=6; else if(p<0.78) idx=7; else if(p<0.9) idx=8; else idx=9;

  if(idx !== camIdx) {
    camIdx = idx;
    var v = camViews[idx];
    camFrom = {x:camera.position.x, y:camera.position.y, z:camera.position.z};
    camTo = {x:v.pos[0], y:v.pos[1], z:v.pos[2]};
    camTarFrom = controls.target.clone();
    camTarTo = new THREE.Vector3(v.tar[0],v.tar[1],v.tar[2]);
    camTransitioning = true;
    camT = 0;
    camHoldTimer = 0;
    document.getElementById('phase-label').textContent = v.name + ' - ' + document.getElementById('phase-label').textContent;
    setTimeout(function(){
      var curEv = events[0];
      for(var i=events.length-1;i>=0;i--){if(progress>=events[i].t){curEv=events[i];break;}}
      document.getElementById('phase-label').textContent = curEv.lb;
    }, 2500);
  }
}

function updateCamera() {
  if(userCam) return;
  if(!camTransitioning && camHoldTimer < 240) {
    camHoldTimer++;
    var v = camViews[camIdx];
    var T = performance.now()*0.0003;
    camera.position.x = v.pos[0] + Math.sin(T)*5;
    camera.position.y = v.pos[1] + Math.cos(T*0.7)*3;
    camera.position.z = v.pos[2] + Math.sin(T*1.3)*3;
    return;
  }
  if(!camTransitioning) return;
  camT += 0.008;
  if(camT >= 1) { camT=1; camTransitioning=false; camHoldTimer=0; }
  var s = camT*camT*(3-2*camT);
  camera.position.x = camFrom.x + (camTo.x-camFrom.x)*s;
  camera.position.y = camFrom.y + (camTo.y-camFrom.y)*s;
  camera.position.z = camFrom.z + (camTo.z-camFrom.z)*s;
  controls.target.x = camTarFrom.x + (camTarTo.x-camTarFrom.x)*s;
  controls.target.y = camTarFrom.y + (camTarTo.y-camTarFrom.y)*s;
  controls.target.z = camTarFrom.z + (camTarTo.z-camTarFrom.z)*s;
}

/* ====== UI 更新 ====== */
function updatePhase(p) {
  var months = ['冬十月','冬十一月','冬十二月','建安十四年春'];
  document.getElementById('t-time').textContent = '建安十三年' + months[Math.min(3,Math.floor(p*4))];

  var curEv = events[0];
  for(var i=events.length-1;i>=0;i--){if(p>=events[i].t){curEv=events[i];break;}}
  if(!camTransitioning) document.getElementById('phase-label').textContent = curEv.lb;

  var el = document.getElementById('ev-list');
  el.innerHTML = '';
  for(var i=0;i<events.length;i++){
    var e = events[i];
    var d = document.createElement('div');
    d.className = 'ev' + (p>=e.t?' on':'');
    d.innerHTML = '<span class="et">'+Math.floor(e.t*100)+'%</span>'+e.lb;
    el.appendChild(d);
  }
  var active = el.querySelectorAll('.on');
  if(active.length) active[active.length-1].scrollIntoView({block:'nearest'});

  var weathers = ['☀ 東南風微弱','☁ 陰天','🌧 小雨','🌫 濃霧','風 東南風大起','火 烈火燎原','火 煙塵滾滾','🌧 大雨','⛅ 風停','☀ 天晴'];
  document.getElementById('weather').textContent = weathers[Math.min(weathers.length-1, Math.floor(p*10))];

  var cp = Math.max(5, 100-p*140);
  var sp = Math.min(80, 55+p*40);
  var lp = Math.min(60, 22+p*55);
  document.getElementById('cao-bar').style.width = cp+'%';
  document.getElementById('sun-bar').style.width = sp+'%';
  document.getElementById('liu-bar').style.width = lp+'%';
  document.getElementById('cao-num').textContent = Math.floor(830000*cp/100).toLocaleString();
  document.getElementById('sun-num').textContent = Math.floor(50000*sp/55).toLocaleString();
  document.getElementById('liu-num').textContent = Math.floor(20000*lp/22).toLocaleString();

  if(curEv.strat && p >= curEv.t && p < curEv.t + 0.04) {
    var stratEl = document.getElementById('strategy-popup');
    stratEl.textContent = curEv.strat;
    stratEl.style.opacity = 1;
    strategyTimer = 180;
  }
}

function moveShips(p) {
  var T = performance.now()*0.001;

  for(var i=0;i<cao.length;i++){
    var u = cao[i];
    if(p < 0.2) {
      var a = p/0.2;
      u.tx = u.ox + Math.sin(T+i)*3;
      u.tz = u.oz - a*60;
    } else if(p < 0.3) {
      u.tx = u.ox + Math.sin(T*0.5+i)*2;
      u.tz = u.oz - 60;
    } else if(p < 0.55) {
      var chainRow = Math.floor(i/8), chainCol = i%8;
      u.tx = -100 + (chainCol-3.5)*8;
      u.tz = u.oz - 60 + (chainRow-2.5)*15;
    } else if(p < 0.7) {
      var s = (p-0.6)/0.1;
      u.tx = u.ox + (Math.sin(i*7)*s*80);
      u.tz = u.oz - 60 - s*120;
    } else if(p < 0.9) {
      var r = (p-0.7)/0.2;
      u.tx = u.ox - r*250;
      u.tz = u.oz - 60 + r*200;
    } else {
      u.tx = u.ox - 300;
      u.tz = u.oz + 250;
    }
    u.x += (u.tx-u.x)*0.04;
    u.z += (u.tz-u.z)*0.04;
    u.mesh.position.x = u.x;
    u.mesh.position.z = u.z;
    u.mesh.position.y = Math.sin(T*2+i*0.5)*0.6;
    u.mesh.rotation.z = (u.tx-u.x)*0.005;
  }

  for(var i=0;i<sun.length;i++){
    var u = sun[i];
    if(p < 0.5) { u.tx = u.ox; u.tz = u.oz; }
    else if(p < 0.66) {
      var a = (p-0.5)/0.16;
      u.tx = u.ox + Math.sin(T+i)*5;
      u.tz = u.oz - a*100;
    } else {
      var r = (p-0.66)/0.34;
      u.tx = u.ox + Math.sin(T+i)*8;
      u.tz = u.oz - 100 - r*80;
    }
    u.x += (u.tx-u.x)*0.04;
    u.z += (u.tz-u.z)*0.04;
    u.mesh.position.set(u.x, Math.sin(T*2+i+100)*0.6, u.z);
  }

  for(var i=0;i<liu.length;i++){
    var u = liu[i];
    if(p < 0.1) {
      var r = p/0.1;
      u.tx = u.ox - r*40;
      u.tz = u.oz + r*30;
    } else if(p < 0.55) { u.tx = u.ox; u.tz = u.oz; }
    else {
      var a = (p-0.55)/0.45;
      u.tx = u.ox + Math.sin(T+i+200)*5;
      u.tz = u.oz - a*120;
    }
    u.x += (u.tx-u.x)*0.04;
    u.z += (u.tz-u.z)*0.04;
    u.mesh.position.set(u.x, Math.sin(T*2+i+200)*0.5, u.z);
  }

  for(var i=0;i<generals.length;i++){
    var g = generals[i];
    g.g.position.x = g.ox + Math.sin(T*0.3+i*2)*4;
    g.g.position.z = g.oz + Math.cos(T*0.2+i*3)*3;
    g.g.children[0].scale.setScalar(1+Math.sin(T*3)*0.2);
  }
}

function updateParticles() {
  for(var i=firePool.length-1;i>=0;i--){
    var p = firePool[i];
    p.m.position.x+=p.vx; p.m.position.y+=p.vy; p.m.position.z+=p.vz;
    p.life-=p.decay;
    p.m.material.opacity=p.life;
    p.m.scale.setScalar(p.life);
    if(p.life<=0){scene.remove(p.m);firePool.splice(i,1);}
  }
  for(var i=smokePool.length-1;i>=0;i--){
    var p = smokePool[i];
    p.m.position.y+=p.vy;
    p.life-=p.decay;
    p.m.material.opacity=p.life*0.4;
    p.m.scale.setScalar(1+(1-p.life)*3);
    if(p.life<=0){scene.remove(p.m);smokePool.splice(i,1);}
  }
}

function animateWater(t) {
  var p = water.geometry.attributes.position;
  var windMult = windDone ? 2.5 : 0.8;
  for(var i=0;i<p.count;i++){
    var x=p.getX(i), y=p.getY(i);
    p.setZ(i, Math.sin(x*0.015+t*0.4)*1.2*windMult + Math.sin(y*0.02+t*0.3)*0.8*windMult);
  }
  p.needsUpdate = true;
}

function updateLighting(p) {
  if(p >= 0.66 && p <= 0.78) {
    ambLight.color.setHex(0x553311);
    ambLight.intensity = 0.35 + Math.sin(performance.now()*0.008)*0.15;
    renderer.toneMappingExposure = 0.55;
    scene.fog.color.setHex(0x2a1000);
  } else {
    ambLight.color.setHex(0x334455);
    ambLight.intensity = 0.5;
    renderer.toneMappingExposure = 0.7;
    scene.fog.color.setHex(0x0a0a1a);
  }
}

function drawMinimap() {
  var cv = document.getElementById('mm-cv');
  var ctx = cv.getContext('2d');
  cv.width = 140; cv.height = 80;
  ctx.fillStyle='#0a1a2a'; ctx.fillRect(0,0,140,80);
  ctx.fillStyle='#1a3a5a'; ctx.fillRect(0,25,140,30);
  var mx=function(x){return (x/1000+0.5)*140;};
  var mz=function(z){return (-z/800+0.5)*80;};
  var colors = {cao:'#4488ff',sun:'#ff4444',liu:'#44cc44'};
  var all = cao.concat(sun, liu);
  for(var i=0;i<all.length;i++){
    var u = all[i];
    ctx.fillStyle = colors[u.army];
    ctx.fillRect(mx(u.x)-1,mz(u.z)-1,2,2);
  }
  ctx.strokeStyle='#ffa500'; ctx.lineWidth=1;
  ctx.strokeRect(mx(camera.position.x)-3,mz(camera.position.z)-3,6,6);
}

/* ====== 音效 ====== */
var audioCtx, masterGain;
var bgMusicInterval = null;
var lastSoundPhase = -1;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
}

function playDrum(freq, dur, vol) {
  if(!audioCtx) return;
  freq=freq||80; dur=dur||0.3; vol=vol||0.3;
  var o = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime+dur);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
  o.connect(g); g.connect(masterGain);
  o.start(); o.stop(audioCtx.currentTime+dur);
}

function playHorn(dur, vol) {
  if(!audioCtx) return;
  dur=dur||2; vol=vol||0.15;
  var o = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  o.type='sawtooth'; o.frequency.value=110;
  g.gain.setValueAtTime(0, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(vol, audioCtx.currentTime+0.3);
  g.gain.setValueAtTime(vol, audioCtx.currentTime+dur-0.5);
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime+dur);
  o.connect(g); g.connect(masterGain);
  o.start(); o.stop(audioCtx.currentTime+dur);
}

function playFireCrackle() {
  if(!audioCtx) return;
  var buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.5, audioCtx.sampleRate);
  var d = buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*0.15))*0.3;
  var s = audioCtx.createBufferSource();
  s.buffer=buf;
  var f = audioCtx.createBiquadFilter();
  f.type='bandpass'; f.frequency.value=2000; f.Q.value=0.5;
  var g = audioCtx.createGain(); g.gain.value=0.2;
  s.connect(f); f.connect(g); g.connect(masterGain);
  s.start();
}

function playWind(vol) {
  if(!audioCtx) return;
  vol=vol||0.08;
  var buf = audioCtx.createBuffer(1, audioCtx.sampleRate*2, audioCtx.sampleRate);
  var d = buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  var s = audioCtx.createBufferSource();
  s.buffer=buf;
  var f = audioCtx.createBiquadFilter();
  f.type='bandpass'; f.frequency.value=400; f.Q.value=0.3;
  var g = audioCtx.createGain(); g.gain.value=vol;
  s.connect(f); f.connect(g); g.connect(masterGain);
  s.start(); s.stop(audioCtx.currentTime+2);
}

function startBGMusic() {
  if(!audioCtx) return;
  if(bgMusicInterval) clearInterval(bgMusicInterval);
  var beat = 0;
  bgMusicInterval = setInterval(function(){
    if(!audioCtx || !audioOn) return;
    playDrum(60+(beat%2)*10, 0.4, 0.12);
    if(beat%4===0) playDrum(50, 0.6, 0.15);
    if(beat%16===0) playHorn(3, 0.06);
    beat++;
  }, 800);
}

function stopBGMusic() {
  if(bgMusicInterval){clearInterval(bgMusicInterval); bgMusicInterval=null;}
}

function phaseSounds(p) {
  var phase = Math.floor(p*10);
  if(phase === lastSoundPhase) return;
  lastSoundPhase = phase;
  if(phase <= 2) playDrum(70, 0.5, 0.2);
  else if(phase <= 5) playWind(0.1);
  else if(phase <= 7) { playFireCrackle(); playDrum(40, 0.8, 0.25); playHorn(2.5, 0.1); }
  else if(phase <= 9) playDrum(50, 0.6, 0.15);
}

/* ====== 控制 ====== */
var btnPlay = document.getElementById('btn-play');
var btnSl = document.getElementById('btn-sl');
var btnSf = document.getElementById('btn-sf');
var fill = document.getElementById('t-fill');
var thumb = document.getElementById('t-thumb');

function syncUI(){
  fill.style.width=progress*100+'%';
  thumb.style.left=progress*100+'%';
  updatePhase(progress);
}

function togglePlay(){
  playing = !playing;
  btnPlay.textContent = playing ? '⏸ 暫停' : '▶ 播放';
  btnPlay.className = playing ? 'on' : '';
  if(playing) { camTransitioning = false; userCam = false; }
}

function speedBy(d){
  speed = Math.max(0.25, Math.min(4, speed + d*0.25));
}

function toggleAudio(){
  if(!audioCtx) { initAudio(); audioCtx.resume(); }
  audioOn = !audioOn;
  document.getElementById('audio-btn').textContent = audioOn ? '🔊 音效' : '🔇 音效';
  masterGain.gain.linearRampToValueAtTime(audioOn?0.3:0, audioCtx.currentTime+0.2);
  if(audioOn) startBGMusic(); else stopBGMusic();
}

function startBattle(){
  if(started) return;
  started = true;
  playing = true;
  btnPlay.textContent = '⏸ 暫停';
  btnPlay.className = 'on';
  document.getElementById('intro').style.opacity = '0';
  setTimeout(function(){document.getElementById('intro').style.display='none';}, 2000);
  if(!audioCtx) initAudio();
  audioOn = true;
  document.getElementById('audio-btn').textContent = '🔊 音效';
  audioCtx.resume();
  startBGMusic();
  playHorn(3, 0.2);
}

// Event listeners
document.getElementById('intro').addEventListener('click', startBattle);
document.getElementById('intro').addEventListener('touchend', function(e){e.preventDefault();startBattle();});
btnPlay.addEventListener('click', togglePlay);
btnSl.addEventListener('click', function(){speedBy(-1);});
btnSf.addEventListener('click', function(){speedBy(1);});
document.getElementById('audio-btn').addEventListener('click', toggleAudio);

// Timeline drag
var track = document.getElementById('t-track');
var dragging = false;
track.addEventListener('mousedown', function(e){dragging=true;slide(e);});
track.addEventListener('touchstart', function(e){dragging=true;slideTouch(e);});
document.addEventListener('mousemove', function(e){if(dragging)slide(e);});
document.addEventListener('touchmove', function(e){if(dragging)slideTouch(e);});
document.addEventListener('mouseup', function(){dragging=false;});
document.addEventListener('touchend', function(){dragging=false;});

function slide(e){
  var r=track.getBoundingClientRect();
  progress = Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  fireDone=false; windDone=false;
  syncUI();
}
function slideTouch(e){
  var r=track.getBoundingClientRect();
  var t = e.touches[0] || e.changedTouches[0];
  progress = Math.max(0,Math.min(1,(t.clientX-r.left)/r.width));
  fireDone=false; windDone=false;
  syncUI();
}

// Keyboard
document.addEventListener('keydown', function(e){
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight'){progress=Math.min(1,progress+0.02);fireDone=false;windDone=false;syncUI();}
  if(e.code==='ArrowLeft'){progress=Math.max(0,progress-0.02);fireDone=false;windDone=false;syncUI();}
});

// Camera control
controls.addEventListener('start', function(){userCam=true;});
var camTimeout;
controls.addEventListener('end', function(){
  clearTimeout(camTimeout);
  camTimeout = setTimeout(function(){if(playing){userCam=false;}}, 4000);
});

// Click generals
var ray = new THREE.Raycaster();
var ms = new THREE.Vector2();
renderer.domElement.addEventListener('click', function(e){
  ms.x=(e.clientX/innerWidth)*2-1;
  ms.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(ms, camera);
  for(var i=0;i<generals.length;i++){
    var g = generals[i];
    if(ray.intersectObject(g.g.children[0]).length>0){
      userCam = true;
      controls.target.set(g.g.position.x, g.g.position.y, g.g.position.z);
      camera.position.set(g.g.position.x+30, g.g.position.y+40, g.g.position.z+30);
      document.getElementById('phase-label').textContent = g.name + ' - ' + g.title;
      setTimeout(function(name,title){return function(){
        var curEv=events[0];
        for(var i=events.length-1;i>=0;i--){if(progress>=events[i].t){curEv=events[i];break;}}
        document.getElementById('phase-label').textContent = curEv.lb;
      };}(g.name,g.title), 4000);
      break;
    }
  }
});

// Resize
window.addEventListener('resize', function(){
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

/* ====== 主循環 ====== */
var clock = new THREE.Clock();
var frameCount = 0;

function animate() {
  requestAnimationFrame(animate);
  var T = clock.getElapsedTime();
  frameCount++;

  if(playing && progress < 1) {
    progress += 0.0002 * speed;
    if(progress >= 1) {
      progress = 1;
      playing = false;
      btnPlay.textContent='↻ 重播';
      btnPlay.className='';
    }
    fill.style.width = progress*100+'%';
    thumb.style.left = progress*100+'%';
  }

  updatePhase(progress);
  moveShips(progress);
  updateLighting(progress);
  animateWater(T);
  updateParticles();

  // Fire trigger
  if(progress >= 0.66 && !fireDone) {
    fireDone = true;
    for(var i=0;i<cao.length;i++){
      (function(idx){setTimeout(function(){
        var u=cao[idx];
        spawnFire(u.x, 2, u.z);
      }, idx*80);})(i);
    }
    (function(){
      var fireLoop = setInterval(function(){
        if(progress>=0.66 && progress<=0.78 && audioOn) {
          spawnFire(-100+(Math.random()-0.5)*100, 2, -300+(Math.random()-0.5)*60);
          playFireCrackle();
        } else {
          clearInterval(fireLoop);
        }
      }, 500);
    })();
  }

  if(progress >= 0.54 && !windDone) { windDone = true; playWind(0.15); }
  if(progress >= 0.82 && progress <= 0.88 && frameCount % 120 === 0) flashLightning();

  if(strategyTimer > 0) {
    strategyTimer--;
    if(strategyTimer <= 0) document.getElementById('strategy-popup').style.opacity = 0;
  }

  if(audioOn) phaseSounds(progress);

  selectCamera(progress);
  updateCamera();

  if(frameCount % 30 === 0) drawMinimap();

  controls.update();
  renderer.render(scene, camera);
}

animate();

})(); // end IIFE
</script>
