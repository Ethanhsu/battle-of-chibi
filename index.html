<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赤壁之戰 - 三國鼎立</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#000;font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif;color:#e8dcc8;user-select:none;}
canvas{display:block;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}

#intro{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;cursor:pointer;}
#intro .bg{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 50% 50%,#1a0800 0%,#000 70%);}
#intro>*{position:relative;z-index:1;}
#intro .dynasty{font-size:16px;color:#8b7355;letter-spacing:16px;margin-bottom:24px;opacity:0;animation:fu 1.5s 0.3s forwards;}
#intro h1{font-size:clamp(48px,10vw,96px);color:#ffd700;text-shadow:0 0 60px rgba(255,100,0,0.5),0 0 120px rgba(255,50,0,0.2);letter-spacing:24px;margin-bottom:10px;opacity:0;animation:fu 1.5s 0.8s forwards;}
#intro .year{font-size:clamp(16px,3vw,24px);color:#b89060;letter-spacing:6px;margin-bottom:30px;opacity:0;animation:fu 1.5s 1.3s forwards;}
#intro .desc{color:#8b7355;font-size:14px;max-width:500px;text-align:center;line-height:1.8;margin-top:10px;opacity:0;animation:fu 1.5s 1.8s forwards;}
#intro .prompt{font-size:14px;color:#665540;animation:pu 2s 2.8s infinite;margin-top:24px;}
@keyframes fu{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes pu{0%,100%{opacity:0.3;}50%{opacity:1;}}

#header{position:absolute;top:0;left:0;width:100%;padding:10px 20px;background:linear-gradient(180deg,rgba(0,0,0,0.8) 0%,transparent 100%);display:flex;justify-content:space-between;align-items:center;z-index:10;}
#header h1{font-size:18px;color:#c8a060;letter-spacing:6px;text-shadow:0 2px 8px #000;}
#header .phase{font-size:14px;color:#ffd700;text-shadow:0 0 10px rgba(255,180,0,0.5);}

#weather{position:absolute;top:48px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);padding:4px 16px;border-radius:16px;font-size:13px;z-index:10;white-space:nowrap;}

#armies{position:absolute;top:76px;left:12px;z-index:10;}
.army-row{display:flex;align-items:center;gap:8px;margin:4px 0;padding:6px 10px;background:rgba(0,0,0,0.6);border-radius:6px;border-left:3px solid;font-size:12px;min-width:200px;}
.army-row.cao{border-color:#4488ff;}.army-row.sun{border-color:#ff4444;}.army-row.liu{border-color:#44cc44;}
.army-row .name{font-weight:bold;min-width:50px;}.army-row.cao .name{color:#6699ff;}.army-row.sun .name{color:#ff6666;}.army-row.liu .name{color:#66dd66;}
.army-row .bar{width:80px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.army-row .bar-f{height:100%;border-radius:2px;transition:width 0.8s;}
.army-row.cao .bar-f{background:#4488ff;}.army-row.sun .bar-f{background:#ff4444;}.army-row.liu .bar-f{background:#44cc44;}
.army-row .count{color:#999;font-size:10px;min-width:60px;text-align:right;}
.army-row .loc{color:#777;font-size:9px;min-width:40px;}

#events{position:absolute;top:76px;right:12px;width:240px;max-height:calc(100vh - 180px);overflow-y:auto;background:rgba(0,0,0,0.6);border-radius:8px;padding:10px;z-index:10;}
#events h3{font-size:13px;color:#c8a060;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.1);}
.ev{padding:4px 0;font-size:11px;line-height:1.4;color:#554;border-bottom:1px solid rgba(255,255,255,0.03);}
.ev.on{color:#ffd700;font-weight:bold;}
.ev .et{color:#444;font-size:10px;margin-right:4px;}

#legend{position:absolute;bottom:84px;right:12px;background:rgba(0,0,0,0.7);border-radius:6px;padding:6px 10px;font-size:10px;z-index:10;}
#legend div{margin:2px 0;display:flex;align-items:center;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;}

#minimap{position:absolute;bottom:84px;left:12px;width:160px;height:90px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.1);border-radius:6px;z-index:10;overflow:hidden;}
#minimap canvas{width:100%;height:100%;}

#cam-hint{position:absolute;bottom:68px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,0.25);z-index:10;white-space:nowrap;}

#strategy-popup{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-size:clamp(28px,6vw,56px);color:#ffd700;text-shadow:0 0 60px rgba(255,100,0,0.8),0 0 120px rgba(255,50,0,0.4),0 4px 8px #000;pointer-events:none;z-index:50;opacity:0;transition:opacity 0.4s;letter-spacing:10px;white-space:nowrap;}

#cam-name{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(14px,2vw,20px);color:rgba(200,160,96,0.9);text-shadow:0 2px 12px #000;pointer-events:none;z-index:45;opacity:0;transition:opacity 0.6s;letter-spacing:6px;}

#audio-btn{position:absolute;top:12px;right:12px;z-index:100;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;pointer-events:auto;}

#timeline{position:absolute;bottom:0;left:0;width:100%;height:58px;background:linear-gradient(0deg,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.3) 80%,transparent 100%);display:flex;align-items:center;padding:0 14px;z-index:10;gap:10px;}
#timeline button{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap;pointer-events:auto;}
#timeline button:hover{background:rgba(255,255,255,0.2);}
#timeline button.on{background:rgba(255,150,0,0.3);border-color:#c89030;}
#t-track{flex:1;height:4px;background:rgba(255,255,255,0.12);border-radius:2px;position:relative;cursor:pointer;}
#t-fill{height:100%;background:linear-gradient(90deg,#4488ff,#ffa500,#ff4400);border-radius:2px;width:0%;}
#t-thumb{position:absolute;top:-5px;width:14px;height:15px;background:#ffd700;border-radius:7px;border:2px solid #8b6914;left:0%;transform:translateX(-50%);cursor:grab;}
#t-label{position:absolute;top:12px;left:0;width:100%;display:flex;justify-content:space-between;font-size:8px;color:rgba(255,255,255,0.3);pointer-events:none;}
#t-time{font-size:11px;color:#c8a060;min-width:75px;text-align:center;white-space:nowrap;}

</style>
</head>
<body>

<div id="intro">
  <div class="bg"></div>
  <div class="dynasty">三 國 時 代</div>
  <h1>赤壁之戰</h1>
  <div class="year">建安十三年 公元 208 年</div>
  <div class="desc">
    曹操據荊州，率軍南下<br>
    劉備敗走夏口，孫權遣周瑜東下<br>
    聯軍於赤壁以火攻大破曹軍
  </div>
  <div class="prompt">- 點擊任意處開始 -</div>
</div>

<div id="ui">
  <div id="header">
    <h1>赤壁之戰</h1>
    <div class="phase" id="phase-label">曹操南下</div>
  </div>
  <div id="weather">☀ 東南風微弱</div>
  <button id="audio-btn">🔇 音效</button>

  <div id="armies">
    <div class="army-row cao"><span class="name">曹操</span><div class="bar"><div class="bar-f" id="cao-bar" style="width:100%"></div></div><span class="count" id="cao-num">200,000</span><span class="loc" id="cao-loc">荊州</span></div>
    <div class="army-row sun"><span class="name">周瑜</span><div class="bar"><div class="bar-f" id="sun-bar" style="width:60%"></div></div><span class="count" id="sun-num">30,000</span><span class="loc" id="sun-loc">柴桑</span></div>
    <div class="army-row liu"><span class="name">劉備</span><div class="bar"><div class="bar-f" id="liu-bar" style="width:24%"></div></div><span class="count" id="liu-num">20,000</span><span class="loc" id="liu-loc">新野</span></div>
  </div>

  <div id="events"><h3>戰事記錄</h3><div id="ev-list"></div></div>
  <div id="legend">
    <div><span class="dot" style="background:#4488ff"></span>曹操軍</div>
    <div><span class="dot" style="background:#ff4444"></span>孫權軍</div>
    <div><span class="dot" style="background:#44cc44"></span>劉備軍</div>
    <div><span class="dot" style="background:#ffa500"></span>計策</div>
  </div>
  <div id="minimap"><canvas id="mm-cv"></canvas></div>
  <div id="strategy-popup"></div>
  <div id="cam-name"></div>
  <div id="cam-hint">滑鼠左鍵旋轉 · 右鍵平移 · 滾輪縮放</div>

  <div id="timeline">
    <button id="btn-play">▶ 播放</button>
    <button id="btn-sl">◀◀</button>
    <button id="btn-sf">▶▶</button>
    <div id="t-track">
      <div id="t-fill"></div>
      <div id="t-thumb"></div>
      <div id="t-label"><span>曹操南下</span><span>孫劉聯盟</span><span>赤壁火攻</span><span>天下三分</span></div>
    </div>
    <div id="t-time">建安十三年冬</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.126.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.126.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function(){
"use strict";

/* ========================================================
   赤壁之戰 3D 戰鬥場景 (歷史修正版)
   
   正確地理與歷史：
   - 曹操佔荊州後順長江東下，主力駐紮烏林（北岸）
   - 劉備在長坂坡敗後退至夏口（漢水入江口）
   - 孫權遣周瑜率水軍三萬東下，於赤壁（南岸）與劉備會合
   - 赤壁在烏林對岸，隔長江相望
   - 火攻為水戰，黃蓋率火船衝入曹軍船陣
   - 曹軍敗後由陸路經華容道撤退（泥濘小路，不在河上）
   - 關羽受命駐守華容道（赤壁戰後）
   ======================================================== */

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.0004);

var camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 1, 4000);
var renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'low-power'});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.toneMapping = THREE.ACESFilmicToneMapping || 0;
renderer.toneMappingExposure = 0.7;
document.body.appendChild(renderer.domElement);

var controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.04;
controls.maxPolarAngle = Math.PI*0.48;
controls.minDistance = 30;
controls.maxDistance = 1500;
controls.target.set(0,0,-100);
camera.position.set(0, 350, 500);

/* ====== 光照 ====== */
var ambLight = new THREE.AmbientLight(0x334455, 0.5);
scene.add(ambLight);
var sunLight = new THREE.DirectionalLight(0xffeedd, 1);
sunLight.position.set(200,300,100);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(1024,1024);
sunLight.shadow.camera.left=-600; sunLight.shadow.camera.right=600;
sunLight.shadow.camera.top=600; sunLight.shadow.camera.bottom=-600;
scene.add(sunLight);
scene.add(new THREE.HemisphereLight(0x6688aa, 0x443322, 0.3));

/* ========================================================
   地形 - 正確地理佈局
   
   長江東西走向（畫面中為南北走向，方便觀看）
   北岸（上/西側）：烏林 - 曹軍駐地
   南岸（下/東側）：赤壁 - 孫劉聯軍
   上游（左側）：荊州、夏口
   下游（右側）：柴桑方向
   
   華容道：陸路，在曹軍北岸以北的陸地上，不在河上
   ======================================================== */

// 長江 - 東西走向（畫面中為南北向）
var waterGeo = new THREE.PlaneGeometry(600, 2000, 40, 60);
var waterMat = new THREE.MeshPhongMaterial({color:0x0a2a4a, shininess:120, specular:0x3355aa, transparent:true, opacity:0.85});
var water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
water.receiveShadow = true;
scene.add(water);

// 北岸（曹軍側 - 烏林）
function makeBank(w, d, cx, cz) {
  var g = new THREE.PlaneGeometry(w, d, 30, 8);
  var p = g.attributes.position;
  for(var i=0;i<p.count;i++) p.setZ(i, 3+Math.random()*2.5);
  g.computeVertexNormals();
  var mesh = new THREE.Mesh(g, new THREE.MeshPhongMaterial({color:0x2a4a1a, flatShading:true}));
  mesh.rotation.x = -Math.PI/2;
  mesh.position.set(cx, 0.5, cz);
  mesh.receiveShadow = true;
  scene.add(mesh);
}
// 北岸（曹）- 在江水以北（畫面右側）
makeBank(300, 600, 250, -100);
// 南岸（孫劉）- 在江水以南（畫面左側）
makeBank(300, 600, -250, -100);

// 赤壁山（南岸）
var hill = new THREE.Mesh(new THREE.ConeGeometry(35, 45, 6, 3), new THREE.MeshPhongMaterial({color:0x8b4513, flatShading:true}));
hill.position.set(-250, 15, 50);
hill.castShadow = true;
scene.add(hill);

// 華容道（北岸以北的陸地，不在河上）
var huarongRoad = new THREE.Mesh(new THREE.PlaneGeometry(8, 200, 2, 8), new THREE.MeshPhongMaterial({color:0x4a3520}));
huarongRoad.rotation.x = -Math.PI/2;
huarongRoad.position.set(250, 1.5, -250);
scene.add(huarongRoad);

// 標籤 - 正確位置
function addLabel(text, x, y, z, color, sz) {
  sz = sz || 1;
  var c = document.createElement('canvas');
  var ctx = c.getContext('2d');
  c.width = 512; c.height = 128;
  ctx.font = 'bold 34px "Microsoft JhengHei","Noto Sans TC",sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillText(text,257,65);
  ctx.fillStyle='#'+color.toString(16).padStart(6,'0'); ctx.fillText(text,256,64);
  var tex = new THREE.CanvasTexture(c);
  var sp = new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false}));
  sp.position.set(x,y,z); sp.scale.set(70*sz,17.5*sz,1);
  scene.add(sp);
  return sp;
}

// 地理標籤
addLabel('長 江', 0, 6, 0, 0x6699cc, 0.8);
addLabel('烏林（曹軍）', 200, 8, -100, 0x8899cc, 0.9);
addLabel('赤壁（聯軍）', -200, 8, 50, 0xcc8866, 0.9);
addLabel('夏口', 0, 8, -400, 0x889999, 0.8);
addLabel('荊州', 0, 8, -550, 0x889999, 0.8);
addLabel('華容道', 250, 8, -250, 0xccaa66, 0.9);
addLabel('柴桑方向 →', -200, 6, 300, 0x668866, 0.7);

/* ========================================================
   船艦系統
   ======================================================== */
function makeShip(color, isFlagship) {
  var g = new THREE.Group();
  var sc = isFlagship ? 1.5 : 0.9;
  // 船體
  var hull = new THREE.Mesh(
    new THREE.BoxGeometry(5*sc, 2*sc, 14*sc),
    new THREE.MeshPhongMaterial({color:0x7a6040})
  );
  hull.castShadow = true;
  g.add(hull);
  // 甲板
  var deck = new THREE.Mesh(new THREE.BoxGeometry(4.5*sc,0.3*sc,13*sc), new THREE.MeshPhongMaterial({color:0x9a8060}));
  deck.position.y = 1.2*sc;
  g.add(deck);
  // 桅杆
  var mast = new THREE.Mesh(new THREE.CylinderGeometry(0.15*sc,0.15*sc,10*sc,4), new THREE.MeshPhongMaterial({color:0x5a4230}));
  mast.position.y = 6*sc;
  g.add(mast);
  // 帆
  var sail = new THREE.Mesh(new THREE.PlaneGeometry(4*sc,7*sc), new THREE.MeshPhongMaterial({color:color,side:THREE.DoubleSide,transparent:true,opacity:0.8}));
  sail.position.y = 6*sc;
  g.add(sail);
  // 旗幟
  var fc = document.createElement('canvas');
  fc.width=128; fc.height=96;
  var f=fc.getContext('2d');
  f.fillStyle='#'+color.toString(16).padStart(6,'0');
  f.fillRect(0,0,128,96);
  f.fillStyle='#fff'; f.font='bold 50px sans-serif'; f.textAlign='center'; f.textBaseline='middle';
  f.fillText(color===0x4488ff?'曹':color===0xff4444?'吳':'劉', 64, 48);
  var flag = new THREE.Mesh(new THREE.PlaneGeometry(3*sc,2*sc), new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(fc),side:THREE.DoubleSide}));
  flag.position.y = 11*sc;
  g.add(flag);
  return g;
}

var caoShips=[], sunShips=[], liuShips=[];
var allShips = [];

// 曹軍船隊 - 從荊州方向來，駐紮烏林（北岸）
function deployShips(arr, army, color, cx, cz, cols, rows, spread, zSpread) {
  for(var i=0;i<cols*rows;i++){
    var col=i%cols, row=Math.floor(i/cols);
    var ox = cx+(col-cols/2)*spread+(Math.random()-0.5)*8;
    var oz = cz+(row-rows/2)*zSpread+(Math.random()-0.5)*6;
    var isFlag = (col===Math.floor(cols/2)&&row===Math.floor(rows/2));
    var ship = makeShip(color, isFlag);
    ship.position.set(ox,0,oz);
    scene.add(ship);
    var u = {mesh:ship, army:army, ox:ox, oz:oz, x:ox, z:oz, tx:ox, tz:oz, idx:i, burning:false};
    arr.push(u);
    allShips.push(u);
  }
}

// 曹軍初始位置：荊州方向（畫面遠處）
deployShips(caoShips, 'cao', 0x4488ff, 100, -500, 10, 4, 22, 20);
// 吳軍初始位置：柴桑方向（畫面近處）
deployShips(sunShips, 'sun', 0xff4444, -100, 250, 6, 3, 22, 20);
// 劉備軍：夏口附近
deployShips(liuShips, 'liu', 0x44cc44, -80, -300, 3, 2, 22, 20);

/* ========================================================
   將領 - 歷史正確位置
   ======================================================== */
var generals = [];
function addGeneral(name, title, color, x, y, z, army) {
  var g = new THREE.Group();
  var glow = new THREE.Mesh(
    new THREE.SphereGeometry(2,8,8),
    new THREE.MeshBasicMaterial({color:color, transparent:true, opacity:0.4})
  );
  g.add(glow);
  g.add(new THREE.Mesh(new THREE.SphereGeometry(1,6,6), new THREE.MeshBasicMaterial({color:0xffffff})));
  g.add(new THREE.PointLight(color, 2, 30));
  addLabel(name, x, y+14, z, color, 0.8);
  g.position.set(x,y,z);
  scene.add(g);
  generals.push({g:g, name:name, title:title, color:color, ox:x, oz:z, army:army});
}

// 曹操在烏林（北岸）
addGeneral('曹操','魏王·荊州牧', 0x4488ff, 120, 6, -120, 'cao');
// 周瑜在赤壁（南岸）
addGeneral('周瑜','大都督·吳軍', 0xff4444, -120, 6, 30, 'sun');
// 劉備在夏口/赤壁
addGeneral('劉備','皇叔', 0x44cc44, -100, 6, -200, 'liu');
// 諸葛亮跟劉備
addGeneral('諸葛亮','軍師', 0x44cc44, -80, 6, -220, 'liu');
// 黃蓋在吳軍
addGeneral('黃蓋','老將', 0xff4444, -140, 6, 50, 'sun');
// 龐統後來投奔劉備
addGeneral('龐統','鳳雛', 0x44cc44, -90, 6, -250, 'liu');
// 魯肅在吳軍
addGeneral('魯肅','長史', 0xff4444, -100, 6, 10, 'sun');
// 許褚在曹軍
addGeneral('許褚','虎賁', 0x4488ff, 140, 6, -130, 'cao');

// 關羽 - 不在赤壁戰場，在江夏/華容道方向
// 戰後才出現
var guanYuGroup = new THREE.Group();
var gyGlow = new THREE.Mesh(new THREE.SphereGeometry(2,8,8), new THREE.MeshBasicMaterial({color:0x44cc44,transparent:true,opacity:0.4}));
guanYuGroup.add(gyGlow);

var audioCtx, masterGain, bgInterval;

function initAudio(){
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
}

function sndDrum(freq,dur,vol){
  if(!audioCtx)return;freq=freq||80;dur=dur||0.3;vol=vol||0.3;
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';o.frequency.setValueAtTime(freq,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(25,audioCtx.currentTime+dur);
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(masterGain);o.start();o.stop(audioCtx.currentTime+dur);
}

function sndHorn(dur,vol){
  if(!audioCtx)return;dur=dur||2;vol=vol||0.12;
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sawtooth';o.frequency.value=110;
  g.gain.setValueAtTime(0,audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(vol,audioCtx.currentTime+0.3);
  g.gain.setValueAtTime(vol,audioCtx.currentTime+dur-0.5);
  g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+dur);
  o.connect(g);g.connect(masterGain);o.start();o.stop(audioCtx.currentTime+dur);
}

function sndFire(){
  if(!audioCtx)return;
  var buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.6,audioCtx.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*0.2))*0.4;
  var s=audioCtx.createBufferSource();s.buffer=buf;
  var f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=2000;f.Q.value=0.5;
  var g=audioCtx.createGain();g.gain.value=0.25;
  s.connect(f);f.connect(g);g.connect(masterGain);s.start();
}

function sndWind(vol){
  if(!audioCtx)return;vol=vol||0.08;
  var buf=audioCtx.createBuffer(1,audioCtx.sampleRate*2,audioCtx.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  var s=audioCtx.createBufferSource();s.buffer=buf;
  var f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=500;f.Q.value=0.3;
  var g=audioCtx.createGain();g.gain.value=vol;
  s.connect(f);f.connect(g);g.connect(masterGain);s.start();s.stop(audioCtx.currentTime+2);
}

function startBGM(){
  if(!audioCtx)return;if(bgInterval)clearInterval(bgInterval);
  var beat=0;
  bgInterval=setInterval(function(){
    if(!audioCtx||!audioOn)return;
    sndDrum(55+(beat%2)*8,0.5,0.1);
    if(beat%4===0)sndDrum(45,0.7,0.12);
    if(beat%16===0)sndHorn(3,0.05);
    beat++;
  },700);
}
function stopBGM(){if(bgInterval){clearInterval(bgInterval);bgInterval=null;}}

/* ========================================================
   船隻移動 - 歷史正確路線
   ======================================================== */
function moveShips(p) {
  var T = performance.now()*0.001;

  /* ---- 曹軍 ---- */
  // 從荊州(-500)南下至烏林(-100)駐紮，火攻後崩潰，經華容道撤退
  caoShips.forEach(function(u, i){
    if(p < 0.1) {
      // 荊州出發
      u.tx = u.ox;
      u.tz = u.oz + (p/0.1)*100; // 向東移動
    } else if(p < 0.4) {
      // 順江東下至烏林
      var t = (p-0.1)/0.3;
      u.tx = 80 + (u.idx%10-4.5)*18;
      u.tz = -500 + t*400 + Math.floor(u.idx/10)*20;
    } else if(p < 0.65) {
      // 駐紮烏林（北岸）
      var cr = Math.floor(u.idx/10), cc = u.idx%10;
      u.tx = 80 + cc*18;
      u.tz = -120 + cr*18;
    } else if(p < 0.7) {
      // 火攻！混亂
      if(!u.burning){
        u.burning = true;
        if(u.mesh.children[0]) u.mesh.children[0].material.color.setHex(0x5a2010);
      }
      var chaos = (p-0.65)/0.05;
      u.tx = u.ox + (Math.random()-0.5)*40;
      u.tz = u.oz - chaos*30;
    } else if(p < 0.85) {
      // 敗退 — 向北岸撤退，準備走華容道
      var retreat = (p-0.7)/0.15;
      u.tx = 100 + retreat*150;
      u.tz = u.oz - retreat*100;
    } else {
      // 經華容道撤退（北岸陸地）
      u.tx = 250;
      u.tz = -250 - (u.idx%5)*10;
    }
    u.x += (u.tx-u.x)*0.02;
    u.z += (u.tz-u.z)*0.02;
    u.mesh.position.set(u.x, Math.sin(T*2+i*0.5)*0.6, u.z);
    u.mesh.rotation.z = (u.tx-u.x)*0.004;
    u.mesh.rotation.x = (u.tz-u.z)*0.002;
  });

  /* ---- 吳軍 ---- */
  // 從柴桑（250）西進至赤壁（50），火攻時衝入曹軍
  sunShips.forEach(function(u, i){
    if(p < 0.3) {
      // 柴桑出發
      u.tx = u.ox;
      u.tz = u.oz - (p/0.3)*150;
    } else if(p < 0.38) {
      // 與劉備會合
      u.tx = -80 + (u.idx%6-2.5)*20;
      u.tz = 50 + Math.floor(u.idx/6)*18;
    } else if(p < 0.65) {
      // 駐紮赤壁（南岸），與曹軍隔江相望
      u.tx = -80 + (u.idx%6-2.5)*20;
      u.tz = 30 + Math.floor(u.idx/6)*18;
    } else if(p < 0.7) {
      // 火船衝向曹軍！
      var rush = (p-0.65)/0.05;
      u.tx = -80 + rush*160; // 從南岸衝向北岸
      u.tz = 30 - rush*130;
    } else if(p < 0.8) {
      // 追擊
      var ch = (p-0.7)/0.1;
      u.tx = 80 + ch*50;
      u.tz = -100 - ch*50;
    } else {
      // 停於烏林附近
      u.tx = 130 + (Math.random()-0.5)*20;
      u.tz = -150 + (Math.random()-0.5)*20;
    }
    u.x += (u.tx-u.x)*0.02;
    u.z += (u.tz-u.z)*0.02;
    u.mesh.position.set(u.x, Math.sin(T*2+i+100)*0.6, u.z);
  });

  /* ---- 劉備軍 ---- */
  // 新野 -> 長坂坡敗 -> 夏口 -> 與吳軍會合於赤壁
  liuShips.forEach(function(u, i){
    if(p < 0.05) {
      // 新野出發
      u.tx = u.ox;
      u.tz = u.oz + (p/0.05)*50;
    } else if(p < 0.15) {
      // 長坂坡敗退
      u.tx = u.ox + (Math.random()-0.5)*20;
      u.tz = u.oz + 50 + (p-0.05)/0.1*150;
    } else if(p < 0.25) {
      // 退守夏口
      u.tx = -60 + (u.idx%3-1)*20;
      u.tz = -380;
    } else if(p < 0.38) {
      // 諸葛亮出使期間，劉備守夏口
      u.tx = -60 + (u.idx%3-1)*20;
      u.tz = -380 + (p-0.25)/0.13*130;
    } else if(p < 0.65) {
      // 與吳軍會合於赤壁
      u.tx = -120 + (u.idx%3-1)*18;
      u.tz = 20 + Math.floor(u.idx/3)*18;
    } else if(p < 0.8) {
      // 夾擊曹軍
      var ch = (p-0.65)/0.15;
      u.tx = -120 + ch*200;
      u.tz = 20 - ch*120;
    } else {
      // 駐紮
      u.tx = 80;
      u.tz = -100;
    }
    u.x += (u.tx-u.x)*0.02;
    u.z += (u.tz-u.z)*0.02;
    u.mesh.position.set(u.x, Math.sin(T*2+i+200)*0.5, u.z);
  });

  /* ---- 將領 ---- */
  generals.forEach(function(g, i){
    g.g.position.x = g.ox + Math.sin(T*0.2+i*2)*3;
    g.g.position.z = g.oz + Math.cos(T*0.15+i*3)*2;
    g.g.children[0].scale.setScalar(1+Math.sin(T*3)*0.2);
  });

  // 關羽 - 戰後才出現
  if(p >= 0.85) {
    guanYuGroup.visible = true;
    guanYuGroup.position.set(250, 6, -250);
  } else {
    guanYuGroup.visible = false;
  }
}

function animateWater(t) {
  var p = water.geometry.attributes.position;
  var wm = windDone ? 2.5 : 0.7;
  for(var i=0;i<p.count;i++){
    var x=p.getX(i),y=p.getY(i);
    p.setZ(i, Math.sin(x*0.015+t*0.4)*1.2*wm + Math.sin(y*0.02+t*0.3)*0.8*wm);
  }
  p.needsUpdate = true;
}

function updateParticles(){
  for(var i=fireParticles.length-1;i>=0;i--){
    var p=fireParticles[i];
    p.m.position.x+=p.vx;p.m.position.y+=p.vy;p.m.position.z+=p.vz;
    p.life-=p.decay; p.m.material.opacity=p.life; p.m.scale.setScalar(p.life);
    if(p.life<=0){scene.remove(p.m);fireParticles.splice(i,1);}
  }
  for(var i=smokeParticles.length-1;i>=0;i--){
    var p=smokeParticles[i];
    p.m.position.y+=p.vy; p.life-=p.decay;
    p.m.material.opacity=p.life*0.4; p.m.scale.setScalar(1+(1-p.life)*3);
    if(p.life<=0){scene.remove(p.m);smokeParticles.splice(i,1);}
  }
  for(var i=arrows.length-1;i>=0;i--){
    var a=arrows[i];
    a.mesh.position.x+=a.vx;a.mesh.position.y+=a.vy;a.mesh.position.z+=a.vz;
    a.vy-=0.06; a.life-=0.012; a.mesh.rotation.x+=0.3;
    if(a.life<=0||a.mesh.position.y<0){scene.remove(a.mesh);arrows.splice(i,1);}
  }
}

}

function selectCamera(p){
  var idx;
  if(p<0.03)idx=0;else if(p<0.08)idx=1;else if(p<0.12)idx=2;
  else if(p<0.16)idx=3;else if(p<0.20)idx=4;else if(p<0.25)idx=5;
  else if(p<0.30)idx=6;else if(p<0.35)idx=7;else if(p<0.40)idx=8;
  else if(p<0.45)idx=9;else if(p<0.50)idx=10;else if(p<0.55)idx=11;
  else if(p<0.60)idx=12;else if(p<0.65)idx=13;else if(p<0.70)idx=14;
  else if(p<0.75)idx=15;else if(p<0.80)idx=16;else if(p<0.85)idx=17;
  else if(p<0.90)idx=18;else if(p<0.95)idx=19;else idx=20;

  if(idx!==camIdx){
    camIdx=idx;
    var v=camViews[idx];
    camFrom={x:camera.position.x,y:camera.position.y,z:camera.position.z};
    camTo={x:v.pos[0],y:v.pos[1],z:v.pos[2]};
    camTarFrom=controls.target.clone();
    camTarTo=new THREE.Vector3(v.tar[0],v.tar[1],v.tar[2]);
    camTransitioning=true; camT=0; camHoldTimer=0;

    var cn=document.getElementById('cam-name');
    cn.textContent=v.name; cn.style.opacity='1';
    setTimeout(function(){cn.style.opacity='0';},2500);

    document.getElementById('phase-label').textContent=v.name+' — '+events.filter(function(e){return p>=e.t;}).pop().lb;
    setTimeout(function(){
      var ce=events[0];
      for(var i=events.length-1;i>=0;i--){if(progress>=events[i].t){ce=events[i];break;}}
      document.getElementById('phase-label').textContent=ce.lb;
    },2500);
  }
}

function updateCamera(){
  if(userCam)return;
  if(!camTransitioning){
    camHoldTimer++;
    var v=camViews[camIdx];
    var T=performance.now()*0.0003;
    camera.position.x=v.pos[0]+Math.sin(T)*3;
    camera.position.y=v.pos[1]+Math.cos(T*0.7)*2;
    camera.position.z=v.pos[2]+Math.sin(T*1.3)*3;
    // 戰鬥震動
    if(progress>=0.65&&progress<=0.75){
      camera.position.x+=(Math.random()-0.5)*1.5;
      camera.position.y+=(Math.random()-0.5)*1;
    }
    return;
  }
  camT+=0.006;
  if(camT>=1){camT=1;camTransitioning=false;camHoldTimer=0;}
  var s=camT*camT*(3-2*camT);
  camera.position.x=camFrom.x+(camTo.x-camFrom.x)*s;
  camera.position.y=camFrom.y+(camTo.y-camFrom.y)*s;
  camera.position.z=camFrom.z+(camTo.z-camFrom.z)*s;
  controls.target.x=camTarFrom.x+(camTarTo.x-camTarFrom.x)*s;
  controls.target.y=camTarFrom.y+(camTarTo.y-camTarFrom.y)*s;
  controls.target.z=camTarFrom.z+(camTarTo.z-camTarFrom.z)*s;
}

/* ========================================================
   UI
   ======================================================== */
function updatePhase(p){
  var months=['冬十月','冬十一月','冬十二月','建安十四年春'];
  document.getElementById('t-time').textContent='建安十三年'+months[Math.min(3,Math.floor(p*4))];

  var curEv=events[0];
  for(var i=events.length-1;i>=0;i--){if(p>=events[i].t){curEv=events[i];break;}}
  if(!camTransitioning) document.getElementById('phase-label').textContent=curEv.lb;

  var el=document.getElementById('ev-list');
  el.innerHTML='';
  for(var i=0;i<events.length;i++){
    var e=events[i];
    var d=document.createElement('div');
    d.className='ev'+(p>=e.t?' on':'');
    d.innerHTML='<span class="et">'+Math.floor(e.t*100)+'%</span>'+e.lb;
    el.appendChild(d);
  }
  var active=el.querySelectorAll('.on');
  if(active.length)active[active.length-1].scrollIntoView({block:'nearest'});

  var weathers=['☀ 晴天','☁ 陰天','🌧 小雨','🌫 濃霧','風 東南風','火 烈火','火 煙塵','🌧 大雨','⛅ 風停','☀ 天晴'];
  document.getElementById('weather').textContent=weathers[Math.min(weathers.length-1,Math.floor(p*10))];

  // 軍力
  var cp=Math.max(5,100-p*140);
  var sp=Math.min(80,55+p*40);
  var lp=Math.min(60,22+p*55);
  document.getElementById('cao-bar').style.width=cp+'%';
  document.getElementById('sun-bar').style.width=sp+'%';
  document.getElementById('liu-bar').style.width=lp+'%';
  document.getElementById('cao-num').textContent=Math.floor(200000*cp/100).toLocaleString();
  document.getElementById('sun-num').textContent=Math.floor(30000*sp/55).toLocaleString();
  document.getElementById('liu-num').textContent=Math.floor(20000*lp/22).toLocaleString();

  // 位置
  var caoLocs=['荊州','江陵','夏口上游','烏林','烏林','烏林','赤壁','華容道','北方'];
  var sunLocs=['柴桑','柴桑','江面','江夏','赤壁','赤壁','赤壁','赤壁','烏林'];
  var liuLocs=['新野','長坂坡','長坂坡','夏口','夏口','赤壁','赤壁','赤壁','烏林'];
  var locIdx=Math.min(8,Math.floor(p*9));
  document.getElementById('cao-loc').textContent=caoLocs[locIdx];
  document.getElementById('sun-loc').textContent=sunLocs[locIdx];
  document.getElementById('liu-loc').textContent=liuLocs[locIdx];

  // 計策彈窗
  var strats={0.50:'鏈 連環計 — 鐵鏈連船！',0.55:'劍 苦肉計 — 黃蓋詐降！',0.60:'風 東南大風起！',0.65:'火 火攻！赤壁燒燬！',0.90:'義 關羽義釋曹操！',0.95:'冠 三足鼎立！'};
  for(var sk in strats){
    if(p>=parseFloat(sk)&&p<parseFloat(sk)+0.05){
      document.getElementById('strategy-popup').textContent=strats[sk];
      document.getElementById('strategy-popup').style.opacity='1';
      strategyTimer=180;
    }
  }
}

function drawMinimap(){
  var cv=document.getElementById('mm-cv');
  var ctx=cv.getContext('2d');
  cv.width=160;cv.height=90;
  ctx.fillStyle='#0a1a2a';ctx.fillRect(0,0,160,90);
  // 長江
  ctx.fillStyle='#1a3a5a';ctx.fillRect(65,0,30,90);
  ctx.font='6px sans-serif';ctx.fillStyle='#6699cc';ctx.fillText('長江',70,45);
  // 北岸
  ctx.fillStyle='#1a3a1a';ctx.fillRect(100,0,60,90);
  ctx.fillStyle='#889999';ctx.fillText('烏林',110,50);
  ctx.fillText('華容道',110,20);
  // 南岸
  ctx.fillStyle='#1a3a1a';ctx.fillRect(0,0,65,90);
  ctx.fillStyle='#889999';ctx.fillText('赤壁',20,50);
  ctx.fillText('夏口',20,80);

  var mx=function(x){return(x/600+0.5)*160;};
  var mz=function(z){return(-z/800+0.5)*90;};
  var colors={cao:'#4488ff',sun:'#ff4444',liu:'#44cc44'};
  allShips.forEach(function(u){ctx.fillStyle=colors[u.army];ctx.fillRect(mx(u.x)-1,mz(u.z)-1,2,2);});
  // 關羽
  if(guanYuGroup.visible){ctx.fillStyle='#44cc44';ctx.fillRect(mx(250)-2,mz(-250)-2,4,4);}
  // 相機
  ctx.strokeStyle='#ffa500';ctx.lineWidth=1;
  ctx.strokeRect(mx(camera.position.x)-3,mz(camera.position.z)-3,6,6);
}

/* ========================================================
   控制
   ======================================================== */
var btnPlay=document.getElementById('btn-play');
var fill=document.getElementById('t-fill');
var thumb=document.getElementById('t-thumb');
var track=document.getElementById('t-track');
var dragging=false;

function togglePlay(){
  playing=!playing;
  btnPlay.textContent=playing?'⏸ 暫停':'▶ 播放';
  btnPlay.className=playing?'on':'';
  if(playing){camTransitioning=false;userCam=false;}
}
function speedBy(d){speed=Math.max(0.25,Math.min(4,speed+d*0.25));}

function toggleAudio(){
  if(!audioCtx){initAudio();audioCtx.resume();}
  audioOn=!audioOn;
  document.getElementById('audio-btn').textContent=audioOn?'🔊 音效':'🔇 音效';
  masterGain.gain.linearRampToValueAtTime(audioOn?0.3:0,audioCtx.currentTime+0.2);
  if(audioOn)startBGM();else stopBGM();
}

function startBattle(){
  if(started)return;
  started=true;
  playing=true;
  btnPlay.textContent='⏸ 暫停'; btnPlay.className='on';
  document.getElementById('intro').style.opacity='0';
  setTimeout(function(){document.getElementById('intro').style.display='none';},2000);
  if(!audioCtx)initAudio();
  audioOn=true;
  document.getElementById('audio-btn').textContent='🔊 音效';
  audioCtx.resume();
  startBGM();
  sndHorn(3,0.2);
}

document.getElementById('intro').addEventListener('click',startBattle);
document.getElementById('intro').addEventListener('touchend',function(e){e.preventDefault();startBattle();});
btnPlay.addEventListener('click',togglePlay);
document.getElementById('btn-sl').addEventListener('click',function(){speedBy(-1);});
document.getElementById('btn-sf').addEventListener('click',function(){speedBy(1);});
document.getElementById('audio-btn').addEventListener('click',toggleAudio);

track.addEventListener('mousedown',function(e){dragging=true;slide(e);});
document.addEventListener('mousemove',function(e){if(dragging)slide(e);});
document.addEventListener('mouseup',function(){dragging=false;});
track.addEventListener('touchstart',function(e){dragging=true;slideT(e);});
document.addEventListener('touchmove',function(e){if(dragging)slideT(e);});
document.addEventListener('touchend',function(){dragging=false;});
function slide(e){var r=track.getBoundingClientRect();progress=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));fireDone=false;windDone=false;syncUI();}
function slideT(e){var r=track.getBoundingClientRect();var t=e.touches[0]||e.changedTouches[0];progress=Math.max(0,Math.min(1,(t.clientX-r.left)/r.width));fireDone=false;windDone=false;syncUI();}

document.addEventListener('keydown',function(e){
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight'){progress=Math.min(1,progress+0.02);fireDone=false;windDone=false;syncUI();}
  if(e.code==='ArrowLeft'){progress=Math.max(0,progress-0.02);fireDone=false;windDone=false;syncUI();}
});

controls.addEventListener('start',function(){userCam=true;});
var camTimeout;
controls.addEventListener('end',function(){clearTimeout(camTimeout);camTimeout=setTimeout(function(){if(playing){userCam=false;}},4000);});

var ray=new THREE.Raycaster();
var mouse=new THREE.Vector2();
renderer.domElement.addEventListener('click',function(e){
  mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,camera);
  for(var i=0;i<generals.length;i++){
    var g=generals[i];
    if(ray.intersectObject(g.g.children[0]).length>0){
      userCam=true;
      controls.target.set(g.g.position.x,g.g.position.y,g.g.position.z);
      camera.position.set(g.g.position.x+30,g.g.position.y+40,g.g.position.z+30);
      document.getElementById('phase-label').textContent=g.name+' — '+g.title;
      (function(nm,tl){setTimeout(function(){
        var ce=events[0];for(var i=events.length-1;i>=0;i--){if(progress>=events[i].t){ce=events[i];break;}}
        document.getElementById('phase-label').textContent=ce.lb;
      },4000);})(g.name,g.title);
      break;
    }
  }
});

window.addEventListener('resize',function(){
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

function syncUI(){fill.style.width=progress*100+'%';thumb.style.left=progress*100+'%';updatePhase(progress);}

/* ========================================================
   主循環
   ======================================================== */
var clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  var T=clock.getElapsedTime();
  frameCount++;

  if(playing&&progress<1){
    progress+=0.0002*speed;
    if(progress>=1){progress=1;playing=false;btnPlay.textContent='↻ 重播';btnPlay.className='';}
    fill.style.width=progress*100+'%';
    thumb.style.left=progress*100+'%';
  }

  updatePhase(progress);
  moveShips(progress);
  updateLighting(progress);
  animateWater(T);
  updateParticles();

  // 火攻觸發 - 船都到了烏林和赤壁後才發生
  if(progress>=0.65&&!fireDone){
    fireDone=true;
    // 吳軍火船衝入曹軍
    caoShips.forEach(function(u,i){
      setTimeout(function(){spawnExplosion(u.x,2,u.z);},i*50);
    });
    // 持續火攻
    (function(){
      var fl=setInterval(function(){
        if(progress>=0.65&&progress<=0.75&&audioOn){
          spawnFire(100+(Math.random()-0.5)*80, 2, -120+(Math.random()-0.5)*50);
          if(frameCount%8===0)sndFire();
        }else clearInterval(fl);
      },300);
    })();
  }

  // 箭矢（隔江射擊）
  if(progress>=0.45&&progress<0.5&&frameCount%40===0){
    for(var i=0;i<8;i++){
      shootArrow(-80+Math.random()*40, 5, 30+Math.random()*20, 80+Math.random()*40, 3, -120+Math.random()*20);
    }
  }

  // 東風
  if(progress>=0.6&&!windDone){windDone=true;sndWind(0.15);}

  // 閃電
  if(progress>=0.85&&progress<=0.92&&frameCount%100===0)flashLightning();

  // 音效階段
  var phase=Math.floor(progress*10);
  if(phase!==lastSoundPhase){
    lastSoundPhase=phase;
    if(phase<=3)sndDrum(70,0.5,0.2);
    else if(phase<=7&&audioOn){sndFire();sndDrum(40,0.8,0.25);}
    else if(phase<=9)sndDrum(50,0.6,0.15);
  }

  if(strategyTimer>0){strategyTimer--;if(strategyTimer<=0)document.getElementById('strategy-popup').style.opacity='0';}

  selectCamera(progress);
  updateCamera();

  if(frameCount%30===0)drawMinimap();

  controls.update();
  renderer.render(scene,camera);
}

animate();

})();
</script>
</body>
